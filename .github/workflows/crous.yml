name: Surveillance logements CROUS

on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 minutes (minimum autorise par GitHub)
  workflow_dispatch: {}      # bouton "Run workflow" pour lancer a la main

concurrency:
  group: crous-watch
  cancel-in-progress: false

permissions:
  contents: write            # pour sauvegarder state.json dans le repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install requests beautifulsoup4

      - name: Verifier les logements
        env:
          SEARCH_URL: ${{ vars.SEARCH_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEARTBEAT: ${{ vars.HEARTBEAT }}
        run: python crous_bot.py

      - name: Sauvegarder l'etat
        run: |
          git config user.name "crous-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "maj etat" && git push)